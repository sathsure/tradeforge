server:
  port: ${PORT:8085}
  # WHY ${PORT:8085}? Render injects PORT — service must bind to it. Falls back to 8085 locally.

spring:
  main:
    lazy-initialization: true
    # WHY lazy-initialization? Cuts cold-start from ~160s to ~30s on Render free tier.
    # Defers bean creation until first use — stays within Render's port scan window.
  application:
    name: portfolio-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tradeforge}
    # WHY full JDBC URL in DB_URL? Cloud (Neon.tech) provides a full URL including
    # sslmode=require. Local dev defaults to the full jdbc URL for same behavior.
    username: ${DB_USER:tradeforge}
    password: ${DB_PASS:tradeforge123}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        default_schema: portfolio
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    schemas: portfolio
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_URI:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    consumer:
      group-id: portfolio-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# WHY market-service.url?
# PortfolioService calls market-service REST API to get live prices.
# Using a config property makes it easy to change the URL for Docker/Kubernetes deployment.
# Docker: market-service:8083, Kubernetes: http://market-service.default.svc.cluster.local
market-service:
  url: ${MARKET_SERVICE_URL:http://localhost:8083}

jwt:
  # Same base64-encoded key as auth-service (same signing algorithm, same key material)
  # base64("tradeforge-super-secret-jwt-key-change-in-production-min-256-bits")
  secret: ${JWT_SECRET:dHJhZGVmb3JnZS1zdXBlci1zZWNyZXQtand0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tradeforge: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
