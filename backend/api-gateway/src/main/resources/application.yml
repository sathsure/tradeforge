server:
  port: ${PORT:8080}
  # WHY ${PORT:8080}? Render.com injects a PORT env var (defaults to 10000).
  # Spring Boot must bind to that port or Render's health check times out.
  # Falls back to 8080 for local development.

spring:
  main:
    lazy-initialization: true
    # WHY lazy-initialization? Cuts cold-start from ~160s to ~30s on Render free tier.
    # Defers bean creation until first use — stays within Render's port scan window.
  application:
    name: api-gateway
    # WHY this name? Registers as "api-gateway" in Eureka.
    # Ops team sees: api-gateway (8080), auth-service (8081), market-service (8083)

  # ── REDIS CONFIG ─────────────────────────────────────────────────────────
  data:
    redis:
      # WHY url instead of host/port/ssl? Lettuce (reactive) breaks SSL handshake with
      # Upstash when configured via host+port+ssl.enabled properties — hostname shows
      # as <unresolved> and ClosedChannelException is thrown before TLS completes.
      # Using the rediss:// URL scheme lets Lettuce handle TLS natively.
      # Cloud: REDIS_URL=rediss://:TOKEN@glowing-hound-67336.upstash.io:6379
      # Local: falls back to plain redis://localhost:6379
      # WHY no separate password? Embedded in URL to avoid Lettuce conflict.
      url: ${REDIS_URL:redis://localhost:6379}
      # WHY 10s? Upstash SSL handshake on cold start takes 3-8s. 2s was too short.
      timeout: 10000ms
      connect-timeout: 10000ms
      lettuce:
        shutdown-timeout: 500ms
      # WHY Redis in Gateway? Used for rate limiting (RequestRateLimiter filter).
      # Redis tracks request counts per client IP across restarts.

  # ── Spring Cloud Gateway Configuration ─────────────────────────────────────
  cloud:
    gateway:
      # WHY httpclient timeouts? Render free tier sleeps after 15min inactivity.
      # Cold start takes ~60s. Without generous timeouts, the gateway's Reactor Netty
      # client times out before the downstream service wakes up → 502 to the client.
      httpclient:
        connect-timeout: 10000      # 10s TCP connect timeout (ms)
        response-timeout: 120s      # 2min response timeout — covers Render cold start
      routes:

        # ── Auth Service Route ─────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          # WHY lb://auth-service?
          # lb = load balancer. Spring Cloud LoadBalancer queries Eureka for instances.
          # "auth-service" must match spring.application.name in auth-service's application.yml.
          # If auth-service runs on 3 instances, requests are round-robin balanced.
          predicates:
            - Path=/api/auth/**
          # WHY Path predicate? Only routes requests with this path prefix to auth-service.
          # GET /api/auth/login → auth-service
          # GET /api/markets/... → not matched here, continues to next route
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}
            # WHY RewritePath? Preserves the full path.
            # Without this, /api/auth/login would hit auth-service as /api/auth/login — correct.
            # StripPrefix=1 would strip /api → auth-service receives /auth/login — wrong!
            # RewritePath captures and re-constructs the path unchanged.

        # ── Auth 2FA Route ─────────────────────────────────────────────────
        # WHY a separate route for /api/auth/2fa/**?
        # The existing auth-service route matches /api/auth/** which covers /api/auth/2fa/** too.
        # However, defining it explicitly allows future rate-limiting (e.g., stricter rate limit
        # on OTP verification endpoints) without affecting /api/auth/login or /api/auth/register.
        # Both routes point to the same auth-service — no behavior change today.
        - id: auth-2fa-service
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          predicates:
            - Path=/api/auth/2fa/**
          filters:
            - RewritePath=/api/auth/2fa/(?<segment>.*), /api/auth/2fa/${segment}

        # ── Market Service Route ───────────────────────────────────────────
        - id: market-service
          uri: ${MARKET_SERVICE_URL:lb://market-service}
          predicates:
            - Path=/api/markets/**
          filters:
            - RewritePath=/api/markets/(?<segment>.*), /api/markets/${segment}

        # ── Order Service Route ────────────────────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URL:lb://order-service}
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /api/orders/${segment}

        # ── Portfolio Service Route ────────────────────────────────────────
        - id: portfolio-service
          uri: ${PORTFOLIO_SERVICE_URL:lb://portfolio-service}
          predicates:
            - Path=/api/portfolio/**
          filters:
            - RewritePath=/api/portfolio/(?<segment>.*), /api/portfolio/${segment}

        # ── Screener Route (via market-service) ────────────────────────────
        # WHY separate route? /api/screener/** is a distinct logical feature
        # (Stock Screener + MF Screener pages). Keeping a separate route makes
        # it easy to move to its own service later without changing the frontend.
        - id: screener-service
          uri: ${MARKET_SERVICE_URL:lb://market-service}
          predicates:
            - Path=/api/screener/**
          filters:
            - RewritePath=/api/screener/(?<segment>.*), /api/screener/${segment}

        # ── Price Alerts Route (via market-service) ────────────────────────
        # WHY separate route for alerts? /api/alerts/** is user-specific and
        # requires JWT extraction. Separate prefix isolates it from the public
        # market data routes and makes auth middleware addition straightforward.
        - id: alerts-service
          uri: ${MARKET_SERVICE_URL:lb://market-service}
          predicates:
            - Path=/api/alerts/**
          filters:
            - RewritePath=/api/alerts/(?<segment>.*), /api/alerts/${segment}

        # ── Warmup Routes ──────────────────────────────────────────────────────
        # WHY warmup routes? Render free-tier services sleep after 15 min inactivity.
        # The frontend pings these on app load to wake all services in parallel.
        # Going through the gateway ensures CORS headers are present (CorsWebFilter).
        # Direct service URLs lack CORS headers → browser blocks the warmup fetch.
        # Each route rewrites /api/warmup/<service> → /actuator/health on the target.
        - id: warmup-auth
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          predicates:
            - Path=/api/warmup/auth
          filters:
            - RewritePath=/api/warmup/auth, /actuator/health

        - id: warmup-market
          uri: ${MARKET_SERVICE_URL:lb://market-service}
          predicates:
            - Path=/api/warmup/market
          filters:
            - RewritePath=/api/warmup/market, /actuator/health

        - id: warmup-order
          uri: ${ORDER_SERVICE_URL:lb://order-service}
          predicates:
            - Path=/api/warmup/order
          filters:
            - RewritePath=/api/warmup/order, /actuator/health

        - id: warmup-portfolio
          uri: ${PORTFOLIO_SERVICE_URL:lb://portfolio-service}
          predicates:
            - Path=/api/warmup/portfolio
          filters:
            - RewritePath=/api/warmup/portfolio, /actuator/health

      # CORS is handled by CorsWebFilter bean in CorsConfig.java (NOT here).
      # WHY not YAML globalcors? Having BOTH the bean AND YAML causes duplicate
      # Access-Control-Allow-Origin headers → browser blocks the request.
      # The CorsWebFilter bean is sufficient for all CORS handling.

# ── Eureka Client ─────────────────────────────────────────────────────────────
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
      # WHY environment variable with default?
      # Docker: EUREKA_URI=http://eureka-server:8761/eureka (container name)
      # Local development: falls back to http://localhost:8761/eureka
    register-with-eureka: ${EUREKA_ENABLED:true}
    # WHY register? Even the Gateway registers itself.
    # Allows monitoring tools to discover all services including the gateway.
    fetch-registry: ${EUREKA_ENABLED:true}
    # WHY fetch? Gateway needs to know about auth-service, market-service instances.
    # Without fetching the registry, lb://auth-service can't resolve to an IP.
  instance:
    prefer-ip-address: true
    # WHY prefer IP? In Docker, container hostnames can be unreliable.
    # IP address is always resolvable within the Docker network.

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
        # WHY include 'gateway'? Exposes /actuator/gateway/routes — shows all routes.
        # Invaluable for debugging routing issues:
        # curl http://localhost:8080/actuator/gateway/routes | jq
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
      # WHY enable gateway endpoint? Allows runtime inspection and route refresh.
      # POST /actuator/gateway/refresh — reloads routes without restart.
  health:
    redis:
      enabled: false
      # WHY disabled? No rate-limiting filter is configured in routes yet.
      # Redis is in the classpath for future rate limiting but not actively used.
      # Disabling prevents false DOWN status on /actuator/health.

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    # WHY DEBUG for gateway? Shows every routing decision:
    # "Route auth-service matched, forwarding to http://172.20.0.3:8081/api/auth/login"
    # Essential for diagnosing "why isn't my request routing to the right service?"
    reactor.netty: INFO
    # WHY INFO for Netty? DEBUG is extremely verbose (hex dumps of every byte).
    # INFO shows connection lifecycle without overwhelming the log.
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
