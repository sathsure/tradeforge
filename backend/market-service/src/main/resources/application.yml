server:
  port: 8083

spring:
  application:
    name: market-service
    # WHY this name? API Gateway routes /api/markets/** to lb://market-service
    # This name must match the gateway route uri exactly.

  kafka:
    # WHY Kafka config here?
    # PriceSimulatorService publishes stock ticks to 'market.ticks' topic every 1s.
    # Spring Boot auto-configures KafkaTemplate using these properties.
    bootstrap-servers: ${KAFKA_URI:localhost:9092}
    # WHY KAFKA_SECURITY_PROTOCOL env var? Local Kafka = PLAINTEXT (no auth).
    # Upstash Kafka (cloud free tier) = SASL_SSL with SCRAM-SHA-256.
    # Setting via env var keeps the same application.yml for both environments.
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: "1"

# ── PRICE SIMULATOR CONFIG ────────────────────────────────────────────────
# WHY configurable rate? Cloud deployment uses 300000ms (5 min) to stay within
# Upstash Kafka free tier (10K messages/day). Local dev uses 1000ms (1 sec).
price:
  simulator:
    fixed-rate: ${PRICE_SIMULATOR_FIXED_RATE:1000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# WHY jwt.secret here?
# PriceAlertController uses JwtUtil to extract userId from the Bearer token.
# Must match auth-service's jwt.secret exactly (same HMAC-SHA256 signing key).
# base64("tradeforge-super-secret-jwt-key-change-in-production-min-256-bits")
jwt:
  secret: ${JWT_SECRET:dHJhZGVmb3JnZS1zdXBlci1zZWNyZXQtand0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1taW4tMjU2LWJpdHM=}

logging:
  level:
    com.tradeforge: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
