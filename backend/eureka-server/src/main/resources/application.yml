server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # WHY false for both?
    # This IS the registry — it should not register itself
    # or try to fetch a registry from another Eureka.
    # Other services set these to true so they register here.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info