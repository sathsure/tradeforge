name: TradeForge CI/CD Pipeline

# WHY GitHub Actions?
# Every push to main auto-builds, tests, and deploys.
# You push code → it deploys itself. Zero manual steps.
# 2,000 free minutes/month on GitHub.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── FRONTEND: Build + Deploy to Vercel ──────────────────────────────────
  frontend:
    name: Angular Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          # WHY cache? npm install downloads packages from internet.
          # Cache stores them between runs — saves 2-3 minutes per build.

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Angular (Production)
        working-directory: frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          # WHY increase memory? Angular production builds with optimizations
          # are memory-intensive. Default 2GB sometimes isn't enough.

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
          # WHY secrets? Tokens in code = security disaster.
          # Anyone who forks your repo could deploy to your Vercel account.
          # GitHub Secrets are encrypted, only accessible to your Actions.

  # ── BACKEND: Build Docker Images + Deploy to Render ────────────────────
  auth-service:
    name: Auth Service Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: backend/auth-service
        run: mvn clean package -DskipTests
        # WHY -DskipTests in CI? We run tests in a separate job.
        # Building and testing in parallel is faster.
        # In real teams: run tests first, only build JAR if tests pass.

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend/auth-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tradeforge-auth:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}"
        # WHY deploy hook? Render gives you a URL that triggers deployment.
        # One HTTP POST and Render pulls your new Docker image and redeploys.
        # No Render SDK needed — just curl.

  market-service:
    name: Market Service Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      - run: mvn clean package -DskipTests
        working-directory: backend/market-service
      - uses: docker/build-push-action@v5
        with:
          context: backend/market-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tradeforge-market:latest
      - run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_MARKET }}"

  # ── SECRETS NEEDED IN GITHUB (Settings → Secrets → Actions) ────────────
  # VERCEL_TOKEN          — from vercel.com/account/tokens
  # VERCEL_ORG_ID         — from .vercel/project.json after first vercel deploy
  # VERCEL_PROJECT_ID     — from .vercel/project.json
  # DOCKERHUB_USERNAME    — your Docker Hub username
  # DOCKERHUB_TOKEN       — Docker Hub → Account Settings → Security → New Token
  # RENDER_DEPLOY_HOOK_AUTH    — Render → Service → Settings → Deploy Hook URL
  # RENDER_DEPLOY_HOOK_MARKET  — same for market service
