server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WHY this location block?
    # Angular is a Single Page Application — all routing is client-side.
    # Without this, navigating to /portfolio directly returns 404 (file not found).
    # This tells Nginx: "if file not found, serve index.html".
    # Angular's router then handles the URL in the browser.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    # WHY? JS/CSS files have hashed filenames (main.a3f2c1.js).
    # Hash changes when content changes — so 1-year cache is safe.
    # Browser caches these files → subsequent page loads are near-instant.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html
    # WHY? index.html references the hashed JS/CSS filenames.
    # If cached, browser won't load new JS after deployment.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    # WHY X-Frame-Options? Prevents clickjacking — embedding your site in an iframe
    # on an attacker's page to trick users into clicking on buttons they don't see.

    add_header X-Content-Type-Options "nosniff";
    # WHY nosniff? Prevents MIME type sniffing.
    # Without this, browser might execute a text/plain response as JavaScript.

    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # WHY? Controls what URL is sent in the Referer header.
    # Prevents leaking your full URL path to third-party analytics/CDNs.

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
    # WHY gzip? Compresses responses. Angular JS bundles shrink by ~70%.
    # 500KB file → 150KB over the wire. Faster load times, less bandwidth.
}
